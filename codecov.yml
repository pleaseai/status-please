# Codecov config — https://docs.codecov.com/docs/codecov-yaml
coverage:
  status:
    project:
      default:
        target: auto # compare against the base commit
        threshold: 1% # tolerate a small drop without failing
    patch:
      default:
        target: 80% # new/changed lines must meet this coverage

comment:
  layout: 'reach, diff, flags, files'
  require_changes: true # only comment when coverage actually changes

# The @statusbeam/cli + create-statusbeam I/O glue (arg dispatch, child-process
# spawning, wrangler/astro orchestration, filesystem scaffolding, prompts, logs)
# is the TS port of the setup/deploy scripts — validated by direct execution,
# not unit tests (mirrors sonar.coverage.exclusions). The pure logic it wraps
# (apply-config, update's PM/upgrade selection) is unit-tested and stays counted.
ignore:
  - 'packages/cli/src/cli.ts'
  - 'packages/cli/src/commands/setup.ts'
  - 'packages/cli/src/commands/deploy.ts'
  - 'packages/cli/src/lib/wrangler.ts'
  - 'packages/cli/src/lib/run.ts'
  - 'packages/cli/src/lib/project.ts'
  - 'packages/cli/src/lib/log.ts'
  - 'packages/cli/src/lib/prompt.ts'
  - 'packages/create-statusbeam/src/index.ts'

# Public repo: uploads are tokenless via OIDC (use_oidc: true in the workflow).
# Test Analytics is driven entirely by the CI upload step
# (codecov/codecov-action with report_type: test_results, reading JUnit XML).
