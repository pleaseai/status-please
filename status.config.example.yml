# Copy to status.config.yml and edit. This single file is the only thing you
# configure. Upload it to the Worker's KV "config" key at deploy time.

name: Acme Status

sites:
  - name: Website
    url: https://example.com
    check: http # http | tcp | ssl
    expectedStatusCodes: [200]
    maxResponseTime: 2000 # ms; slower responses are marked "degraded"
  - name: API
    url: https://api.example.com/health
    check: http

# All optional. Keep the real Slack URL in the private config you upload to KV,
# not in this committed example (the webhook URL is a secret).
notifications:
  slack:
    webhookUrl: https://hooks.slack.com/services/T00000000/B00000000/XXXXXXXXXXXXXXXXXXXX
  webhooks:
    - url: https://example.com/status-hook

theme:
  logoUrl: /logo.svg
  darkMode: true
  # Fallback UI language, used only when a visitor's browser language isn't one
  # of the supported locales (en | zh | ja | ko). Visitors are otherwise served
  # /en/ /ja/ /ko/ /zh/ based on Accept-Language. Defaults to en.
  locale: en
