# SonarQube Cloud project config
# https://docs.sonarsource.com/sonarqube-cloud/advanced-setup/analysis-parameters/

sonar.projectKey=pleaseai_statusbeam
sonar.organization=pleaseai

# Monorepo: analyze the workspaces, carve out tests via inclusions.
sonar.sources=.
sonar.tests=.
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts

# Coverage report emitted by `bun test --coverage` — the same file Codecov uploads.
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclude generated, vendored, and build output from analysis.
sonar.exclusions=**/dist/**,**/node_modules/**,coverage/**,**/.astro/**,**/.wrangler/**

# Copy-paste detection exclusion: the i18n dictionaries (one `const <locale>:
# Dict` object per language) necessarily repeat the same key structure across
# locales — that structural repetition is what the `Dict` type enforces, not
# copy-paste. CPD flags it as duplication, so exclude the translation file.
sonar.cpd.exclusions=packages/core/src/i18n.ts

# The coverage gate applies to the domain logic in packages/ (unit-tested).
# The apps (Astro UI islands + Cloudflare Worker runtime glue) are validated by
# build + integration/e2e, not unit coverage — so they are excluded here.
# Also exclude vendored shadcn/ui components and framework config/type files,
# and the setup/deploy scripts (validated by direct execution, not unit tests).
# The @statusbeam/cli + create-statusbeam I/O glue (arg dispatch, child-process
# spawning, wrangler/astro orchestration, filesystem scaffolding, prompts, logs)
# is the TS port of those same setup/deploy scripts — validated by direct
# execution, not unit tests. The pure logic it wraps (apply-config's JSONC
# editing + normalizeDomain, update's package-manager/upgrade-command selection)
# is unit-tested and stays under the gate.
sonar.coverage.exclusions=**/*.test.*,**/*.spec.*,**/*.config.*,**/env.d.ts,apps/**,**/components/ui/**,scripts/**,packages/cli/src/cli.ts,packages/cli/src/commands/setup.ts,packages/cli/src/commands/deploy.ts,packages/cli/src/lib/wrangler.ts,packages/cli/src/lib/run.ts,packages/cli/src/lib/project.ts,packages/cli/src/lib/log.ts,packages/cli/src/lib/prompt.ts,packages/create-statusbeam/src/index.ts
