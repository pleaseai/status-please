# SonarQube Cloud project config
# https://docs.sonarsource.com/sonarqube-cloud/advanced-setup/analysis-parameters/

sonar.projectKey=pleaseai_status-please
sonar.organization=pleaseai

# Monorepo: analyze the workspaces, carve out tests via inclusions.
sonar.sources=.
sonar.tests=.
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts

# Coverage report emitted by `bun test --coverage` — the same file Codecov uploads.
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclude generated, vendored, and build output from analysis.
sonar.exclusions=**/dist/**,**/node_modules/**,coverage/**,**/.astro/**,**/.wrangler/**
sonar.coverage.exclusions=**/*.test.*,**/*.spec.*,**/*.config.*,**/env.d.ts,apps/web/src/pages/**
