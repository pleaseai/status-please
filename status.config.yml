# Live demo config for statusbeam. This monitors a handful of stable public
# endpoints so the hosted demo shows real, moving data. Not a secret — committed
# so the deploy uploads it to the Worker's KV "config" key (see DEPLOYMENT.md §3).
# Keep real webhook URLs out of here; set them post-deploy via secrets/KV.

name: statusbeam Demo

sites:
  - name: GitHub API
    url: https://api.github.com
    check: http
    expectedStatusCodes: [200]
    maxResponseTime: 2000
  - name: Cloudflare
    url: https://www.cloudflare.com
    check: http
    expectedStatusCodes: [200]
    maxResponseTime: 2000
  - name: npm Registry
    url: https://registry.npmjs.org
    check: http
    expectedStatusCodes: [200]
    maxResponseTime: 3000
  - name: Cloudflare DNS
    url: https://1.1.1.1
    check: http
    expectedStatusCodes: [200]
  - name: OpenAI
    # incident.io status page — read via its Statuspage-compatible summary.json.
    url: https://status.openai.com
    check: incidentio

theme:
  darkMode: true
