# Live demo config for statusbeam. This monitors a handful of stable public
# endpoints so the hosted demo shows real, moving data. Not a secret — committed
# so the deploy uploads it to the Worker's KV "config" key (see DEPLOYMENT.md §3).
# Keep real webhook URLs out of here; set them post-deploy via secrets/KV.

name: statusbeam Demo

sites:
  # Statuspage adapter — mirror each vendor's own published verdict (their
  # /api/v2/summary.json) instead of a naive reachability ping. GitHub, Cloudflare
  # and npm all publish an Atlassian Statuspage. See docs/adapters/statuspage.md.
  - name: GitHub
    url: https://www.githubstatus.com
    check: statuspage
  - name: Cloudflare
    url: https://www.cloudflarestatus.com
    check: statuspage
  - name: npm
    url: https://status.npmjs.org
    check: statuspage
    component: Package installation

  # One plain http check for contrast — a direct reachability probe.
  - name: Cloudflare DNS
    url: https://1.1.1.1
    check: http
    expectedStatusCodes: [200]

theme:
  darkMode: true
