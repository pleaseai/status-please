name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least privilege by default; jobs opt into more.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Codecov tokenless upload via OIDC
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} # job-level so the guard `if:` can read it
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # SonarQube needs full history for blame/new-code

      - name: Set up mise (node + bun)
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test with coverage
        run: bun run test --coverage --reporter=junit --reporter-outfile=test-report.junit.xml

      - name: Build
        run: bun run build

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage/lcov.info
          use_oidc: true

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }} # failed tests are exactly what Test Analytics reports
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          report_type: test_results
          files: ./test-report.junit.xml
          use_oidc: true

      - name: SonarQube Cloud scan
        if: ${{ !cancelled() && env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0

  zizmor:
    name: Zizmor workflow lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload SARIF to code scanning
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
