name: Release Please

# Conventional-Commits-driven versioning. On every push to main, release-please
# maintains a "release PR" that bumps the version + updates CHANGELOG.md; merging
# that PR tags the release and cuts a GitHub Release.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release PR + GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # create tags/releases and the release PR's commits
      pull-requests: write # open/update the release PR
      issues: write # release-please labels the release PR (labels go via the issues API)
    steps:
      # pleaseai org: run as the release-bot GitHub App, not GITHUB_TOKEN — the
      # default token can't trigger downstream CI on the release PR (GitHub
      # suppresses its events to avoid recursion). The App acts as a distinct
      # actor, so those events propagate.
      - name: Mint release-bot token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_GITHUB_APP_CLIENT_ID }} # org Variable (ALL)
          private-key: ${{ secrets.RELEASE_GITHUB_APP_PRIVATE_KEY }} # org Secret (ALL)
          # Scope the minted token to only what release-please needs, instead of
          # the App's blanket installation permissions.
          permission-contents: write
          permission-pull-requests: write
          permission-issues: write

      - name: Release please
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
